<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Créditos</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; }
      .main { margin-left: 260px; padding: 2rem; }
    </style>
  </head>
  <body>
    {% include 'sidebar.html' %}
    <div class="main">
      <h1>Créditos</h1>
      {% macro anio_dropdown(id, name, selected) %}
        <select id="{{ id }}" name="{{ name }}" required>
          {% set current = (2025) %}
          {% for y in range(current, current+10) %}
            <option value="{{ y }}" {% if y==selected %}selected{% endif %}>{{ y }}</option>
          {% endfor %}
        </select>
      {% endmacro %}

      <form id="plan-form" style="margin-bottom:2rem;">
        <label>Año a proyectar:
          {{ anio_dropdown('anio', 'anio', 2025) }}
        </label>
        <label style="margin-left:1.5em;">Valor UF base:
          <input type="number" id="uf_base" name="uf_base" step="0.01" value="37000" required>
        </label>
        <label style="margin-left:1.5em;">% variación anual UF:
          <input type="number" id="uf_var" name="uf_var" step="0.01" value="6.0" required> %
        </label>
      </form>

      <h2>Obligaciones</h2>
      <form id="oblig-form" style="display:flex;flex-wrap:wrap;gap:0.5em 1em;align-items:end;margin-bottom:0.5em;background:#f8f8f8;padding:1em 0.5em;border-radius:8px;box-shadow:0 1px 4px #0001;">
          <button type="button" id="cargar-ejemplo" style="margin-bottom:1em;background:#4caf50;color:white;border:none;border-radius:4px;padding:0.5em 1.5em;font-weight:bold;">Cargar ejemplo</button>
        <div style="display:flex;flex-direction:column;">
          <label for="oblig-nombre">Nombre</label>
          <input type="text" id="oblig-nombre" maxlength="30" required placeholder="Ej: Crédito Banco" style="width:10em;">
        </div>
        <div style="display:flex;flex-direction:column;">
          <label for="oblig-tipo">Tipo</label>
          <select id="oblig-tipo" required style="width:8em;">
            <option value="hipotecario">Hipotecario</option>
            <option value="consumo">Consumo</option>
            <option value="seguro">Seguro</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;">
          <label for="oblig-moneda">Moneda</label>
          <select id="oblig-moneda" required style="width:6em;">
            <option value="CLP">CLP</option>
            <option value="UF">UF</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;">
          <label for="oblig-monto">Monto cuota</label>
          <input type="number" id="oblig-monto" min="1" step="0.01" required placeholder="Ej: 100000" style="width:8em;">
        </div>
        <div style="display:flex;flex-direction:column;">
          <label for="oblig-cuotas">Cuotas</label>
          <input type="number" id="oblig-cuotas" min="1" max="600" required placeholder="Ej: 12" style="width:5em;">
        </div>
        <div style="display:flex;flex-direction:column;">
          <label for="oblig-inicio">Inicio</label>
          <input type="month" id="oblig-inicio" required style="width:10em;">
        </div>
        <div style="display:flex;flex-direction:column;">
          <label for="oblig-fin">Fin (auto)</label>
          <input type="month" id="oblig-fin" style="width:10em;">
        </div>
              <script>
              // Autocalcular Fin al cambiar cuotas o inicio
              function recalcularFin() {
                const cuotas = parseInt(document.getElementById('oblig-cuotas').value);
                const inicio = document.getElementById('oblig-inicio').value;
                if(!cuotas||!inicio) return;
                let [anio, mes] = inicio.split('-').map(Number);
                if(!anio||!mes) return;
                let total = cuotas-1;
                let mes_fin = mes+total;
                let anio_fin = anio + Math.floor((mes_fin-1)/12);
                mes_fin = ((mes_fin-1)%12)+1;
                // Formato yyyy-MM
                document.getElementById('oblig-fin').value = anio_fin+'-'+(mes_fin<10?'0':'')+mes_fin;
              }
              document.getElementById('oblig-cuotas').addEventListener('input',recalcularFin);
              document.getElementById('oblig-inicio').addEventListener('input',recalcularFin);
              </script>
        <button type="button" id="vista-previa-btn" style="height:2.2em;margin-top:1.2em;background:#2a7ae2;color:white;border:none;border-radius:4px;padding:0 1.5em;font-weight:bold;">Vista previa</button>
      </form>
      <div id="oblig-vista-previa" style="margin-bottom:1em;"></div>
      </form>
      <table id="obligaciones-table" style="margin-bottom:1em;">
        <thead>
          <tr>
            <th>Nombre</th><th>Tipo</th><th>Moneda</th><th>Monto cuota</th><th>Cuotas</th><th>Inicio</th><th>Fin</th><th></th>
          </tr>
        </thead>
        <tbody id="obligaciones-tbody"></tbody>
      </table>

      <div id="proyeccion"></div>

      <script>
      // Estado en memoria
      let obligaciones = [];
      function renderObligaciones() {
        const tbody = document.getElementById('obligaciones-tbody');
        tbody.innerHTML = '';
        const anio = parseInt(document.getElementById('anio').value);
        obligaciones.forEach((o, idx) => {
          // Mostrar solo si está activa en el año seleccionado
          let ini = (o.anio_ini===anio) ? o.mes-1 : (o.anio_ini<anio ? 0 : 12);
          let fin = ini + o.cuotas - 1;
          if(o.mes_fin && o.anio_fin) {
            if(o.anio_fin===anio) fin = o.mes_fin-1;
            else if(o.anio_fin<anio) fin = -1;
            else if(o.anio_fin>anio) fin = 11;
          }
          let activa = (ini<=11 && fin>=0);
          if(!activa) return;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${o.nombre}</td>
            <td>${o.tipo}</td>
            <td>${o.moneda}</td>
            <td>${o.monto}</td>
            <td>${o.cuotas}</td>
            <td>${('0'+o.mes).slice(-2)}/${o.anio_ini}</td>
            <td>${o.mes_fin && o.anio_fin ? (('0'+o.mes_fin).slice(-2)+'/'+o.anio_fin) : ''}</td>
            <td><button type="button" onclick="eliminarOblig(${idx})">Eliminar</button></td>
          `;
          tbody.appendChild(tr);
        });
      }
      function eliminarOblig(idx) {
        obligaciones.splice(idx,1); renderObligaciones(); calcularProyeccion();
      }

      // Vista previa lógica
      function calcularVistaPreviaOblig() {
        const nombre = document.getElementById('oblig-nombre').value.trim();
        const tipo = document.getElementById('oblig-tipo').value;
        const moneda = document.getElementById('oblig-moneda').value;
        const monto = parseFloat(document.getElementById('oblig-monto').value);
        const cuotas = parseInt(document.getElementById('oblig-cuotas').value);
        const inicio = document.getElementById('oblig-inicio').value;
        const fin = document.getElementById('oblig-fin').value;
        if(!nombre||!tipo||!moneda||!monto||!cuotas||!inicio) return '';
        const [anio_ini, mes] = inicio.split('-').map(Number);
        let mes_fin = '', anio_fin = '';
        if(fin) [anio_fin, mes_fin] = fin.split('-').map(Number);
        // Parámetros UF
        const anio = parseInt(document.getElementById('anio').value);
        const uf_base = parseFloat(document.getElementById('uf_base').value);
        const uf_var = parseFloat(document.getElementById('uf_var').value);
        let uf_mes = [];
        let uf = uf_base;
        const tasa_mensual = Math.pow(1+uf_var/100,1/12)-1;
        for(let m=0;m<12;m++) { uf_mes.push(uf); uf = uf*(1+tasa_mensual); }
        // Determinar meses activos
        let ini = (anio_ini===anio) ? mes-1 : (anio_ini<anio ? 0 : 12);
        let fin_idx = ini + cuotas - 1;
        if(mes_fin && anio_fin) {
          if(anio_fin===anio) fin_idx = mes_fin-1;
          else if(anio_fin<anio) fin_idx = -1;
          else if(anio_fin>anio) fin_idx = 11;
        }
        let mensual = Array(12).fill(0);
        for(let m=0;m<12;m++) {
          let activa = (m>=ini && m<=fin_idx);
          if(anio_ini<anio && m<=fin_idx && ini===0) activa = (m<=fin_idx);
          if(!activa) continue;
          if(['seguro','consumo','hipotecario'].includes(tipo.toLowerCase())) {
            if(moneda==='CLP') mensual[m] += monto;
            else mensual[m] += monto*uf_mes[m];
          }
        }
        let total = mensual.reduce((a,b)=>a+b,0);
        let meses_activos = mensual.map((v,i)=>v>0 ? i : null).filter(v=>v!==null).map(i=>['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][i]);
        let html = `<div style='background:#e3f2fd;padding:1em 1.5em;border-radius:8px;margin-bottom:0.5em;max-width:900px;'>`;
        html += `<b>Vista previa de obligación:</b><br>`;
        html += `<span>Meses activos: ${meses_activos.length>0 ? meses_activos.join(', ') : 'Ninguno'}</span><br>`;
        html += `<table style='margin-top:0.5em;'><tr><th>Mes</th>`;
        for(let m=0;m<12;m++) html += `<th>${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m]}</th>`;
        html += `<th>Total</th></tr><tr><td>CLP</td>`;
        for(let m=0;m<12;m++) html += `<td>${mensual[m]>0?mensual[m].toLocaleString('es-CL',{maximumFractionDigits:0}):'-'}</td>`;
        html += `<td><b>${total.toLocaleString('es-CL',{maximumFractionDigits:0})}</b></td></tr></table>`;
        html += `</div>`;
        return html;
      }

      function mostrarVistaPrevia() {
        document.getElementById('oblig-vista-previa').innerHTML = calcularVistaPreviaOblig();
      }

      // Actualizar vista previa al cambiar cualquier campo
      ['oblig-nombre','oblig-tipo','oblig-moneda','oblig-monto','oblig-cuotas','oblig-inicio','oblig-fin','anio','uf_base','uf_var'].forEach(id=>{
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', mostrarVistaPrevia);
      });
      document.getElementById('anio').addEventListener('change', function(){
        renderObligaciones(); calcularProyeccion(); mostrarVistaPrevia();
      });

      document.getElementById('vista-previa-btn').onclick = function() {
        mostrarVistaPrevia();
        // Mostrar botón agregar solo si hay vista previa válida
        const prev = document.getElementById('oblig-vista-previa');
        let btn = document.getElementById('agregar-oblig-btn');
        if(!btn) {
          btn = document.createElement('button');
          btn.id = 'agregar-oblig-btn';
          btn.type = 'button';
          btn.textContent = 'Agregar obligación';
          btn.style = 'margin:0.5em 0 0 0;background:#2a7ae2;color:white;border:none;border-radius:4px;padding:0.5em 1.5em;font-weight:bold;';
          btn.onclick = function() {
            // Agregar obligación
            const nombre = document.getElementById('oblig-nombre').value.trim();
            const tipo = document.getElementById('oblig-tipo').value;
            const moneda = document.getElementById('oblig-moneda').value;
            const monto = parseFloat(document.getElementById('oblig-monto').value);
            const cuotas = parseInt(document.getElementById('oblig-cuotas').value);
            const inicio = document.getElementById('oblig-inicio').value;
            const fin = document.getElementById('oblig-fin').value;
            if(!nombre||!tipo||!moneda||!monto||!cuotas||!inicio) return;
            const [anio_ini, mes] = inicio.split('-').map(Number);
            let mes_fin = '', anio_fin = '';
            if(fin) [anio_fin, mes_fin] = fin.split('-').map(Number);
            obligaciones.push({nombre,tipo,moneda,monto,cuotas,mes,anio_ini,mes_fin,anio_fin});
            renderObligaciones(); calcularProyeccion();
            document.getElementById('oblig-form').reset();
            document.getElementById('oblig-vista-previa').innerHTML = '';
          };
          prev.appendChild(btn);
        }
        btn.style.display = calcularVistaPreviaOblig() ? 'inline-block' : 'none';
      };

      document.getElementById('cargar-ejemplo').onclick = function() {
        obligaciones.length = 0;
        obligaciones.push(
          {nombre:'Hipotecario UF',tipo:'hipotecario',moneda:'UF',monto:10,cuotas:360,mes:1,anio_ini:2025,mes_fin:'',anio_fin:''},
          {nombre:'Consumo CLP',tipo:'consumo',moneda:'CLP',monto:150000,cuotas:24,mes:3,anio_ini:2025,mes_fin:'',anio_fin:''},
          {nombre:'Seguro Vida',tipo:'seguro',moneda:'UF',monto:1.5,cuotas:12,mes:6,anio_ini:2025,mes_fin:'',anio_fin:''},
          {nombre:'Seguro Auto',tipo:'seguro',moneda:'CLP',monto:25000,cuotas:12,mes:1,anio_ini:2025,mes_fin:'',anio_fin:''}
        );
        renderObligaciones(); calcularProyeccion();
      };
      document.getElementById('plan-form').onchange = calcularProyeccion;
      function calcularProyeccion() {
        const anio = parseInt(document.getElementById('anio').value);
        const uf_base = parseFloat(document.getElementById('uf_base').value);
        const uf_var = parseFloat(document.getElementById('uf_var').value);
        // Calcular UF estimada por mes
        let uf_mes = [];
        let uf = uf_base;
        const tasa_mensual = Math.pow(1+uf_var/100,1/12)-1;
        for(let m=0;m<12;m++) { uf_mes.push(uf); uf = uf*(1+tasa_mensual); }
        // Proyección mensual
        let mensual = Array(12).fill(0);
        obligaciones.forEach(o => {
          // Determinar meses activos
          let ini = (o.anio_ini===anio) ? o.mes-1 : (o.anio_ini<anio ? 0 : 12);
          let fin = ini + o.cuotas - 1;
          // Si hay fecha de término manual, usarla
          if(o.mes_fin && o.anio_fin) {
            if(o.anio_fin===anio) fin = o.mes_fin-1;
            else if(o.anio_fin<anio) fin = -1;
            else if(o.anio_fin>anio) fin = 11;
          }
          for(let m=0;m<12;m++) {
            let activa = (m>=ini && m<=fin);
            if(o.anio_ini<anio && m<=fin && ini===0) activa = (m<=fin);
            if(!activa) continue;
            // Reglas por tipo y moneda
            if(['seguro','consumo','hipotecario'].includes(o.tipo.toLowerCase())) {
              if(o.moneda==='CLP') mensual[m] += o.monto;
              else mensual[m] += o.monto*uf_mes[m];
            }
          }
        });
        let total = mensual.reduce((a,b)=>a+b,0);
        let prom = total/12;
        // Mostrar tabla
        let html = `<h2>Proyección mensual en CLP (${anio})</h2><table><tr><th>Mes</th>`;
        for(let m=0;m<12;m++) html += `<th>${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m]}</th>`;
        html += `<th>Total</th><th>Promedio</th></tr><tr><td>CLP</td>`;
        for(let m=0;m<12;m++) html += `<td>${mensual[m].toLocaleString('es-CL',{maximumFractionDigits:0})}</td>`;
        html += `<td><b>${total.toLocaleString('es-CL',{maximumFractionDigits:0})}</b></td><td><b>${prom.toLocaleString('es-CL',{maximumFractionDigits:0})}</b></td></tr></table>`;
        document.getElementById('proyeccion').innerHTML = html;
      }
      // Inicial
      calcularProyeccion();
      </script>
    </div>
  </body>
</html>
